<div class="container">
  <h2>📦 Gestão de Produtos</h2>

  <!-- FORMULÁRIO -->
  <div class="card">
    <h3>{{ editando ? 'Editar Produto' : 'Novo Produto' }}</h3>

    <form (ngSubmit)="salvarProduto()">
      <input
        type="text"
        placeholder="Nome do produto"
        [(ngModel)]="produto.name"
        name="name"
        required
      />

      <input
        type="number"
        placeholder="Preço"
        [(ngModel)]="produto.price"
        name="price"
        required
      />

      <!-- NOVO CAMPO: Quantidade -->
      <input
        type="number"
        placeholder="Quantidade"
        [(ngModel)]="produto.quantity"
        name="quantity"
        required
      />

      <div class="buttons">
        <button type="submit">
          {{ editando ? 'Atualizar' : 'Criar' }}
        </button>

        <button type="button" (click)="limpar()">
          Limpar
        </button>
      </div>
    </form>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h3>Lista de Produtos</h3>

    <div *ngFor="let p of produtos" class="item">
      <div>
        <strong>{{ p.name }}</strong><br />
        R$ {{ p.price }} | Qtd: {{ p.quantity }}
      </div>

      <div class="actions">
        <button (click)="editar(p)">Editar</button>
        <button (click)="deletar(p.id)">Excluir</button>
      </div>
    </div>
  </div>
</div>
